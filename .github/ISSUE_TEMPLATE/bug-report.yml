name: Reproducible bug report
description: Report one Runtrail defect with a minimal, sanitized reproduction.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Report one defect. Never paste tokens, webhook URLs, authorization headers, prompts, environment values, private ledger data, raw tool output, or host-only paths.
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options: ["HTTP API or backend", "CLI", "MCP or integration", "UI", "Deployment", "Documentation", "Other"]
    validations: {required: true}
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.24.1 or commit SHA
    validations: {required: true}
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include OS, architecture, Node/pnpm, and client/transport when relevant.
    validations: {required: true}
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide exact steps with placeholders for sensitive values.
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected behavior}
    validations: {required: true}
  - type: textarea
    id: actual
    attributes: {label: Actual behavior}
    validations: {required: true}
  - type: dropdown
    id: regression
    attributes:
      label: Regression status
      options: ["Previously worked", "Never worked", "Unknown"]
    validations: {required: true}
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Include only the smallest relevant excerpt; do not paste raw tool output or environment dumps.
    validations: {required: false}
  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Describe affected workflows and any known unaffected paths.
    validations: {required: true}
  - type: dropdown
    id: pr
    attributes:
      label: Willing to submit a pull request?
      options: ["Yes", "No", "Maybe, with guidance"]
    validations: {required: true}
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed secrets, prompts, private ledger data, environment values, authorization headers, and raw tool output.
          required: true
